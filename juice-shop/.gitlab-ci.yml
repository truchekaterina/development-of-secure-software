# Lab 4 — SCA + Lab 5 — Semgrep SAST + Lab 6 — DAST + Lab 7 — Gitleaks secrets
# GitLab: http://10.0.0.10/root/juice-shop-lab — runner tag: shared (VM-101)
#
# Required CI/CD variables (Settings → CI/CD → Variables):
#   DEFECTDOJO_TOKEN, DEFECTDOJO_PRODUCTID
#   DEPENDENCYTRACK_API_KEY, DEPENDENCYTRACK_PROJECT_UUID
#   REGISTRY_USER, REGISTRY_PASSWORD — only if VM-101 registry requires auth (else omit)
#
# Do NOT rely on GitLab CI_REGISTRY for build_app — it may point at Docker Hub.
# App images for ZAP: course registry 10.0.0.11:5000 (see COURSE_REGISTRY).
#
# Optional overrides in GitLab (else from YAML below):
#   DEFECTDOJO_URL, DEPENDENCYTRACK_URL, DEFECTDOJO_PRODUCT_NAME
#
# Runtime (defectdojo-init → defectdojo.env artifact, do not set manually):
#   DEFECTDOJO_ENGAGEMENTID, DEFECTDOJO_ENGAGEMENT_NAME

stages:
  - .pre
  - pre-build
  - build
  - test-time
  - post-build
  - quality-gate
  - .post

default:
  tags:
    - shared

variables:
  TRIVY_IMAGE: "localhost:5000/trivy:latest"
  SEMGREP_VERSION: "1.95.0"
  SEMGREP_IMAGE: "localhost:5000/semgrep:latest"
  ZAP_IMAGE: "localhost:5000/zaproxy:latest"
  GITLEAKS_IMAGE: "localhost:5000/gitleaks:latest"
  # Kaniko push (from job container): 10.0.0.11:5000. Runner service pull: localhost:5000 (insecure HTTP).
  COURSE_REGISTRY: "10.0.0.11:5000"
  REGISTRY_PUSH: "10.0.0.11:5000/juice-shop-lab/app"
  APP_IMAGE: "localhost:5000/juice-shop-lab/app:$CI_COMMIT_SHORT_SHA"
  ZAP_TARGET: "http://target-app:3000"
  REPORT_DIR: "semgrep/reports"
  GIT_DEPTH: "1"
  DEFECTDOJO_URL: "http://10.0.0.20:8080"
  DEFECTDOJO_PRODUCT_NAME: "OWASP Juice Shop"
  DEPENDENCYTRACK_URL: "http://10.0.0.30:8081"

# Lab 7: only MR + main (+ schedule/ZAP) — skip branch-push pipelines (avoids cancel storm on feature branches)
workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$RUN_ZAP_FULL == "true"'
    - when: never

# ---------- .pre ----------
defectdojo-init:
  stage: .pre
  image: curlimages/curl:latest
  script:
    - |
      set -e
      DEFECTDOJO_URL="${DEFECTDOJO_URL%/}"
      for var in DEFECTDOJO_URL DEFECTDOJO_TOKEN DEFECTDOJO_PRODUCTID; do
        eval "val=\$$var"
        if [ -z "$val" ]; then
          echo "ERROR: CI variable $var is empty"
          exit 1
        fi
      done
      ENGAGEMENT_NAME="Lab7 CI ${CI_PIPELINE_ID}"
      NOW=$(date +%s)
      TARGET_START=$(date +%Y-%m-%d)
      TARGET_END=$(date -r "$((NOW + 604800))" +%Y-%m-%d 2>/dev/null \
        || date -d "@$((NOW + 604800))" +%Y-%m-%d 2>/dev/null \
        || date -I -d "+7 days" 2>/dev/null \
        || date +%Y-%m-%d)
      printf '%s\n' \
        "{" \
        "  \"name\": \"${ENGAGEMENT_NAME}\"," \
        "  \"product\": ${DEFECTDOJO_PRODUCTID}," \
        "  \"target_start\": \"${TARGET_START}\"," \
        "  \"target_end\": \"${TARGET_END}\"," \
        "  \"engagement_type\": \"CI/CD\"," \
        "  \"build_id\": \"${CI_PIPELINE_ID}\"," \
        "  \"commit_hash\": \"${CI_COMMIT_SHA}\"," \
        "  \"branch_tag\": \"${CI_COMMIT_REF_NAME}\"," \
        "  \"source_code_management_uri\": \"${CI_PROJECT_URL}\"," \
        "  \"status\": \"In Progress\"" \
        "}" > engagement.json
      cat engagement.json
      ENGAGEMENT=$(curl -f -S -X POST "${DEFECTDOJO_URL}/api/v2/engagements/" \
        -H "Authorization: Token ${DEFECTDOJO_TOKEN}" \
        -H "Content-Type: application/json" \
        -d @engagement.json)
      echo "$ENGAGEMENT"
      ENGAGEMENT_ID=$(echo "$ENGAGEMENT" | grep -oE '"id"[[:space:]]*:[[:space:]]*[0-9]+' | head -1 | sed 's/.*:[[:space:]]*//')
      case "$ENGAGEMENT_ID" in
        ''|*[!0-9]*)
          echo "ERROR: failed to parse engagement id"
          exit 1
          ;;
      esac
      echo "Created engagement id=$ENGAGEMENT_ID name=$ENGAGEMENT_NAME"
      printf 'DEFECTDOJO_ENGAGEMENTID=%s\n' "$ENGAGEMENT_ID" > defectdojo.env
      printf 'DEFECTDOJO_ENGAGEMENT_NAME="%s"\n' "$ENGAGEMENT_NAME" >> defectdojo.env
      cat defectdojo.env
  artifacts:
    reports:
      dotenv: defectdojo.env
    paths:
      - defectdojo.env
    expire_in: 1 week
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$RUN_ZAP_FULL == "true"'

# ---------- build (Lab 6 — app image for ZAP) ----------
# Kaniko only — NO docker:dind (runner is not privileged). services: [] avoids sidecar dind.
build_app:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: [""]
  services: []
  timeout: 30m
  before_script:
    - echo "Lab6 build_app commit=${CI_COMMIT_SHORT_SHA} pipeline=${CI_PIPELINE_ID}"
    - mkdir -p /kaniko/.docker
    - |
      cat > /kaniko/.docker/config.json <<'EOF'
      {"auths":{},"credsStore":"","credHelpers":{},"insecure-registries":["10.0.0.11:5000","localhost:5000"]}
      EOF
      echo "REGISTRY_PUSH=${REGISTRY_PUSH}:${CI_COMMIT_SHORT_SHA} APP_IMAGE=${APP_IMAGE} (Kaniko)"
  script:
    - |
      set -e
      /kaniko/executor \
        --context "${CI_PROJECT_DIR}" \
        --dockerfile lab6/Dockerfile.patched \
        --destination "${REGISTRY_PUSH}:${CI_COMMIT_SHORT_SHA}" \
        --insecure \
        --skip-tls-verify \
        --skip-tls-verify-pull
      echo "VERIFY build_app pushed ${REGISTRY_PUSH}:${CI_COMMIT_SHORT_SHA} (ZAP pulls ${APP_IMAGE})"
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
      - script_failure
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$RUN_ZAP_FULL == "true"'

# ---------- pre-build ----------
secret-scan:
  stage: pre-build
  image:
    name: $GITLEAKS_IMAGE
    entrypoint: [""]
  variables:
    GIT_DEPTH: "0"
  dependencies: []
  before_script:
    - chmod +x ci/lab7-gitleaks-ci.sh
  script:
    - sh ci/lab7-gitleaks-ci.sh
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - gitleaks-report.json
  allow_failure: false
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

sca-manifest:
  stage: pre-build
  image: node:20
  dependencies: []
  script:
    - |
      set -e
      npm ci --ignore-scripts || npm install --package-lock-only --ignore-scripts
      npm audit --json > npm-audit-raw.json || true
      test -s npm-audit-raw.json
      node ci/convert-npm-audit-v2-to-v1.js npm-audit-raw.json npm-audit.json
      grep -q '"advisories"' npm-audit.json || { echo "ERROR npm-audit.json missing advisories"; exit 1; }
      npm audit || true
  artifacts:
    paths:
      - npm-audit.json
    expire_in: 1 week

semgrep_scan:
  stage: pre-build
  image:
    name: $SEMGREP_IMAGE
    entrypoint: [""]
  dependencies: []
  variables:
    SEMGREP_METRICS: "off"
  before_script:
    - mkdir -p "${REPORT_DIR}"
    - semgrep --version
  script:
    - |
      semgrep scan \
        --config semgrep/rules/language \
        --config semgrep/rules/owasp \
        --config semgrep/rules/stack \
        --config semgrep/rules/custom \
        --json --output "${REPORT_DIR}/report.json" \
        --sarif-output "${REPORT_DIR}/report.sarif" \
        --metrics=off --no-rewrite-rule-ids .
    - test -s "${REPORT_DIR}/report.json"
    - |
      echo "Severity summary:"
      grep -o '"severity": "[^"]*"' "${REPORT_DIR}/report.json" | sort | uniq -c || true
  artifacts:
    when: always
    paths:
      - semgrep/reports/
    reports:
      sast: ${REPORT_DIR}/report.sarif
    expire_in: 1 week
  allow_failure: true
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

upload_semgrep_defectdojo:
  stage: pre-build
  image: curlimages/curl:latest
  needs:
    - job: defectdojo-init
      artifacts: true
    - job: semgrep_scan
      artifacts: true
  script:
    - |
      set -e
      DEFECTDOJO_URL="${DEFECTDOJO_URL%/}"
      . ./ci/load-defectdojo-env.sh
      load_defectdojo_env
      for var in DEFECTDOJO_URL DEFECTDOJO_TOKEN DEFECTDOJO_PRODUCT_NAME; do
        eval "val=\$$var"
        if [ -z "$val" ]; then
          echo "ERROR: $var is empty"
          exit 1
        fi
      done
      test -s "${REPORT_DIR}/report.json"
      echo "Semgrep upload: product=${DEFECTDOJO_PRODUCT_NAME} engagement=${DEFECTDOJO_ENGAGEMENTID} name=${DEFECTDOJO_ENGAGEMENT_NAME}"
      dd_upload_semgrep() {
        ENDPOINT=$1
        curl -S -o semgrep-import-response.json -w "%{http_code}" \
          -X POST "${DEFECTDOJO_URL}/api/v2/${ENDPOINT}/" \
          -H "Authorization: Token ${DEFECTDOJO_TOKEN}" \
          -F "scan_type=Semgrep JSON Report" \
          -F "product_name=${DEFECTDOJO_PRODUCT_NAME}" \
          -F "engagement=${DEFECTDOJO_ENGAGEMENTID}" \
          -F "engagement_name=${DEFECTDOJO_ENGAGEMENT_NAME}" \
          -F "file=@${REPORT_DIR}/report.json" \
          -F "active=true" \
          -F "verified=false" \
          -F "minimum_severity=Low" \
          -F "scan_date=$(date +%Y-%m-%d)" \
          -F "tags=semgrep,ci,${CI_COMMIT_REF_SLUG}" \
          -F "commit_hash=${CI_COMMIT_SHA}" \
          -F "branch_tag=${CI_COMMIT_REF_NAME}"
      }
      HTTP=$(dd_upload_semgrep reimport-scan) || { echo "ERROR: curl failed"; exit 1; }
      echo "reimport-scan HTTP $HTTP"
      cat semgrep-import-response.json
      case "$HTTP" in
        200|201) echo "Semgrep reimport OK" ;;
        *)
          echo "reimport-scan failed ($HTTP), trying import-scan..."
          HTTP=$(dd_upload_semgrep import-scan) || { echo "ERROR: curl failed"; exit 1; }
          echo "import-scan HTTP $HTTP"
          cat semgrep-import-response.json
          case "$HTTP" in
            200|201) echo "Semgrep import OK" ;;
            *) echo "ERROR: DefectDojo Semgrep upload failed HTTP $HTTP"; exit 1 ;;
          esac
          ;;
      esac
  allow_failure: true
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

# ---------- build ----------
sbom-generate:
  stage: build
  image:
    name: $TRIVY_IMAGE
    entrypoint: [""]
  dependencies: []
  script:
    - trivy version
    - trivy fs --format cyclonedx --output sbom.cdx.json .
    - test -s sbom.cdx.json
  artifacts:
    paths:
      - sbom.cdx.json
    expire_in: 1 week
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

# ---------- test-time (Lab 6 — DAST) ----------
zap_baseline:
  stage: test-time
  image:
    name: $ZAP_IMAGE
    entrypoint: [""]
  services:
    - name: $APP_IMAGE
      alias: target-app
      pull_policy: always
  variables:
    GIT_STRATEGY: none
  needs:
    - job: build_app
  script:
    - echo "ZAP service image ${APP_IMAGE} (runner insecure registry localhost:5000)"
    - mkdir -p /zap/wrk && cd /zap/wrk
    - |
      set -e
      READY=0
      for i in $(seq 1 60); do
        if curl -sf "${ZAP_TARGET}/rest/products/search?q=apple" >/dev/null 2>&1; then
          echo "App ready after ${i} attempt(s)"
          READY=1
          break
        fi
        echo "Waiting for target-app ($i/60)..."
        sleep 2
      done
      if [ "$READY" -ne 1 ]; then
        echo "ERROR: ${ZAP_TARGET} not reachable — check build_app pushed ${APP_IMAGE}"
        exit 1
      fi
    - zap-baseline.py -t "$ZAP_TARGET" -r baseline.html -x baseline.xml -J baseline.json || true
    - |
      test -s baseline.xml || test -s baseline.json || {
        echo "ERROR ZAP produced no baseline.xml/json in /zap/wrk"
        ls -la
        exit 1
      }
    - cp baseline.html baseline.xml baseline.json "${CI_PROJECT_DIR}/"
  artifacts:
    when: always
    paths:
      - baseline.html
      - baseline.xml
      - baseline.json
    expire_in: 1 week
  allow_failure: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

zap_full_scan:
  stage: test-time
  timeout: 2h
  image:
    name: $ZAP_IMAGE
    entrypoint: [""]
  services:
    - name: $APP_IMAGE
      alias: target-app
  variables:
    GIT_STRATEGY: none
  needs:
    - job: build_app
  script:
    - mkdir -p /zap/wrk && cd /zap/wrk
    - |
      set -e
      READY=0
      for i in $(seq 1 60); do
        if curl -sf "${ZAP_TARGET}/rest/products/search?q=apple" >/dev/null 2>&1; then
          echo "App ready after ${i} attempt(s)"
          READY=1
          break
        fi
        echo "Waiting for target-app ($i/60)..."
        sleep 2
      done
      if [ "$READY" -ne 1 ]; then
        echo "ERROR: ${ZAP_TARGET} not reachable"
        exit 1
      fi
    - zap-full-scan.py -t "$ZAP_TARGET" -r full.html -x full.xml -J full.json || true
    - |
      test -s full.xml || test -s full.json || echo "WARN full scan produced no full.xml/json"
    - cp full.html full.xml full.json "${CI_PROJECT_DIR}/" 2>/dev/null || true
  artifacts:
    when: always
    paths:
      - full.html
      - full.xml
      - full.json
    expire_in: 1 week
  allow_failure: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$RUN_ZAP_FULL == "true"'

# ---------- post-build ----------
sbom-upload-dt:
  stage: post-build
  image: curlimages/curl:latest
  needs:
    - job: sbom-generate
      artifacts: true
  script:
    - |
      set -e
      DEPENDENCYTRACK_URL="${DEPENDENCYTRACK_URL%/}"
      for var in DEPENDENCYTRACK_URL DEPENDENCYTRACK_API_KEY DEPENDENCYTRACK_PROJECT_UUID; do
        eval "val=\$$var"
        if [ -z "$val" ]; then
          echo "WARN: $var is empty — skip DT upload (Lab 6 not affected)"
          exit 0
        fi
      done
      test -s sbom.cdx.json
      AUTH_CHECK=$(curl -s -o /dev/null -w "%{http_code}" \
        -H "X-API-Key: ${DEPENDENCYTRACK_API_KEY}" \
        "${DEPENDENCYTRACK_URL}/api/v1/project/${DEPENDENCYTRACK_PROJECT_UUID}" || echo "000")
      echo "DT project lookup HTTP ${AUTH_CHECK}"
      if [ "$AUTH_CHECK" = "401" ] || [ "$AUTH_CHECK" = "403" ]; then
        echo "WARN: DEPENDENCYTRACK_API_KEY invalid/expired or no access to project UUID"
        echo "Fix: http://10.0.0.30:8081 → Administration → Access Management → Teams/API Keys"
        echo "GitLab → Settings → CI/CD → Variables → DEPENDENCYTRACK_API_KEY (Masked)"
        echo "Job exits 0 — Lab 6 (ZAP) is not blocked. See ci/DT_API_KEY_SETUP.md"
        exit 0
      fi
      HTTP=$(curl -S -o dt-bom-response.json -w "%{http_code}" -X POST "${DEPENDENCYTRACK_URL}/api/v1/bom" \
        -H "X-API-Key: ${DEPENDENCYTRACK_API_KEY}" \
        -F "project=${DEPENDENCYTRACK_PROJECT_UUID}" \
        -F "bom=@sbom.cdx.json") || { echo "ERROR: curl to Dependency-Track failed"; exit 1; }
      echo "DT BOM upload HTTP ${HTTP}"
      cat dt-bom-response.json
      case "$HTTP" in
        200|201) ;;
        401|403)
          echo "WARN: DT BOM upload unauthorized — update DEPENDENCYTRACK_API_KEY (exit 0, Lab 6 OK)"
          exit 0
          ;;
        *) echo "ERROR: Dependency-Track returned HTTP ${HTTP}"; exit 1 ;;
      esac
      RESPONSE=$(cat dt-bom-response.json)
      echo "$RESPONSE"
      TOKEN=$(echo "$RESPONSE" | grep -oE '"token"[[:space:]]*:[[:space:]]*"[^"]*"' | head -1 | sed 's/.*:[[:space:]]*"//; s/"$//')
      test -n "$TOKEN"
      for i in $(seq 1 30); do
        STATUS=$(curl -sf -H "X-API-Key: ${DEPENDENCYTRACK_API_KEY}" \
          "${DEPENDENCYTRACK_URL}/api/v1/bom/token/${TOKEN}") || { sleep 10; continue; }
        echo "$STATUS"
        echo "$STATUS" | grep -qE '"processing"[[:space:]]*:[[:space:]]*false' && exit 0
        sleep 10
      done
      echo "WARNING: BOM still processing after 300s"
  allow_failure: true
  rules:
    - if: '$SKIP_SBOM_DT == "true"'
      when: never
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

# ---------- quality-gate (needs: skips waiting for post-build) ----------
semgrep_gate:
  stage: quality-gate
  image: alpine:3.20
  needs:
    - job: semgrep_scan
      artifacts: true
  before_script:
    - apk add --no-cache jq
  script:
    - |
      set -e
      test -s "${REPORT_DIR}/report.json"
      CRITICAL=$(jq '[.results[] | select(.extra.severity == "ERROR")] | length' "${REPORT_DIR}/report.json")
      echo "Semgrep ERROR findings: $CRITICAL (threshold 15)"
      if [ "$CRITICAL" -gt 15 ]; then
        echo "Quality gate FAILED"
        exit 1
      fi
      echo "Quality gate PASSED"
  allow_failure: false
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

# ---------- .post ----------
defectdojo-import:
  stage: .post
  image: curlimages/curl:latest
  needs:
    - job: defectdojo-init
      artifacts: true
    - job: sca-manifest
      artifacts: true
  script:
    - |
      set -e
      DEFECTDOJO_URL="${DEFECTDOJO_URL%/}"
      . ./ci/load-defectdojo-env.sh
      load_defectdojo_env
      for var in DEFECTDOJO_URL DEFECTDOJO_TOKEN DEFECTDOJO_PRODUCT_NAME; do
        eval "val=\$$var"
        if [ -z "$val" ]; then
          echo "ERROR: $var is empty"
          exit 1
        fi
      done
      test -s npm-audit.json
      grep -q '"advisories"' npm-audit.json
      echo "npm audit import: product=${DEFECTDOJO_PRODUCT_NAME} engagement=${DEFECTDOJO_ENGAGEMENTID} name=${DEFECTDOJO_ENGAGEMENT_NAME}"
      HTTP=$(curl -S -o import-response.json -w "%{http_code}" \
        -X POST "${DEFECTDOJO_URL}/api/v2/import-scan/" \
        -H "Authorization: Token ${DEFECTDOJO_TOKEN}" \
        -F "scan_type=NPM Audit Scan" \
        -F "product_name=${DEFECTDOJO_PRODUCT_NAME}" \
        -F "engagement=${DEFECTDOJO_ENGAGEMENTID}" \
        -F "engagement_name=${DEFECTDOJO_ENGAGEMENT_NAME}" \
        -F "file=@npm-audit.json" \
        -F "active=true" \
        -F "verified=true") || { echo "ERROR: curl failed"; exit 1; }
      echo "import-scan HTTP $HTTP"
      cat import-response.json
      case "$HTTP" in
        200|201) echo "npm audit import OK" ;;
        *)
          echo "import-scan failed ($HTTP), trying without engagement_name..."
          HTTP=$(curl -S -o import-response.json -w "%{http_code}" \
            -X POST "${DEFECTDOJO_URL}/api/v2/import-scan/" \
            -H "Authorization: Token ${DEFECTDOJO_TOKEN}" \
            -F "scan_type=NPM Audit Scan" \
            -F "engagement=${DEFECTDOJO_ENGAGEMENTID}" \
            -F "file=@npm-audit.json" \
            -F "active=true" \
            -F "verified=true") || exit 1
          echo "fallback import HTTP $HTTP"
          cat import-response.json
          case "$HTTP" in
            200|201) echo "npm audit import OK (fallback)" ;;
            *) echo "ERROR: npm import failed HTTP $HTTP"; exit 1 ;;
          esac
          ;;
      esac
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

defectdojo-import-gitleaks:
  stage: .post
  image: curlimages/curl:latest
  when: always
  needs:
    - job: defectdojo-init
      artifacts: true
    - job: secret-scan
      artifacts: true
      optional: true
  script:
    - |
      set -e
      DEFECTDOJO_URL="${DEFECTDOJO_URL%/}"
      . ./ci/load-defectdojo-env.sh
      load_defectdojo_env
      if [ ! -s gitleaks-report.json ]; then
        echo "WARN: gitleaks-report.json missing — skip import"
        exit 0
      fi
      echo "Gitleaks import: engagement=${DEFECTDOJO_ENGAGEMENTID} name=${DEFECTDOJO_ENGAGEMENT_NAME}"
      HTTP=$(curl -S -o gitleaks-import-response.json -w "%{http_code}" \
        -X POST "${DEFECTDOJO_URL}/api/v2/import-scan/" \
        -H "Authorization: Token ${DEFECTDOJO_TOKEN}" \
        -F "scan_type=Gitleaks Scan" \
        -F "engagement=${DEFECTDOJO_ENGAGEMENTID}" \
        -F "file=@gitleaks-report.json" \
        -F "active=true" \
        -F "verified=false" \
        -F "minimum_severity=Low") || { echo "ERROR: curl failed"; exit 1; }
      echo "import-scan HTTP $HTTP"
      cat gitleaks-import-response.json
      case "$HTTP" in
        200|201) echo "Gitleaks import OK" ;;
        *) echo "ERROR: DefectDojo Gitleaks import failed HTTP $HTTP"; exit 1 ;;
      esac
  allow_failure: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

defectdojo-import-zap:
  stage: .post
  image: curlimages/curl:latest
  needs:
    - job: defectdojo-init
      artifacts: true
    - job: zap_baseline
      artifacts: true
      optional: true
    - job: zap_full_scan
      artifacts: true
      optional: true
  script:
    - |
      set -e
      DEFECTDOJO_URL="${DEFECTDOJO_URL%/}"
      . ./ci/load-defectdojo-env.sh
      load_defectdojo_env || exit 1
      . ./ci/import-zap-defectdojo.sh
      for var in DEFECTDOJO_URL DEFECTDOJO_TOKEN; do
        eval "val=\$$var"
        if [ -z "$val" ]; then
          echo "ERROR: $var is empty"
          exit 1
        fi
      done
      import_zap_report "baseline.xml" "ZAP Baseline - pipeline ${CI_PIPELINE_ID}" || exit 1
      import_zap_report "full.xml" "ZAP Full Scan - pipeline ${CI_PIPELINE_ID}"
      echo "defectdojo-import-zap finished"
  allow_failure: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$RUN_ZAP_FULL == "true"'
